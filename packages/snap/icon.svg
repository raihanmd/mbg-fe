<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Wallet body - rounded square with top-right cutout -->
  <rect x="72" y="120" width="320" height="272" rx="40" fill="#7B9CC2"/>
  <!-- Top edge fill to smooth the cutout area -->
  <rect x="72" y="120" width="320" height="40" rx="40" fill="#7B9CC2"/>
  <rect x="72" y="120" width="224" height="16" fill="#7B9CC2"/>
  <!-- Right tab/clasp extending from wallet -->
  <rect x="352" y="210" width="56" height="96" rx="14" fill="#7B9CC2"/>
  <!-- Dark navy snap button on tab -->
  <circle cx="380" cy="258" r="18" fill="#1E2D3D"/>
  <!-- Star badge background - dark navy circle -->
  <circle cx="340" cy="150" r="42" fill="#1E2D3D"/>
  <!-- Six-pointed asterisk/star - white -->
  <polygon
    points="340,120 348,138 367,138 352,149 358,167 340,155 322,167 328,149 313,138 332,138"
    fill="#FFFFFF"
  />
  <!-- Wallet inner detail - subtle line suggesting fold -->
  <rect x="72" y="316" width="280" height="12" rx="4" fill="#6B8CB2" opacity="0.5"/>
  <!-- Bottom clasp tab -->
  <rect x="352" y="330" width="56" height="22" rx="8" fill="#7B9CC2"/>
</svg>